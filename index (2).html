<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samvidhan AI — Your Constitutional Guide</title>
<meta name="description" content="AI-powered guide to the Indian Constitution by Madhuri AI Digital Sakhi.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:oklch(0.13 0.02 280);--fg:oklch(0.95 0.01 280);
  --card:oklch(0.18 0.025 280);--muted-fg:oklch(0.65 0.02 280);
  --primary:oklch(0.65 0.2 270);--primary-fg:oklch(0.98 0 0);
  --secondary:oklch(0.22 0.03 280);--accent:oklch(0.55 0.2 250);
  --glass:oklch(0.18 0.025 280/60%);--glass-border:oklch(0.4 0.04 280/30%);
  --glass-strong:oklch(0.15 0.02 280/80%);
  --input-bg:oklch(0.25 0.03 280);--border:oklch(0.3 0.03 280/50%);
  --gradient-hero:linear-gradient(135deg,oklch(0.5 0.2 260),oklch(0.45 0.22 290),oklch(0.65 0.18 50));
  --gradient-user:linear-gradient(135deg,oklch(0.55 0.2 260),oklch(0.5 0.22 285));
  --gradient-ai:linear-gradient(135deg,oklch(0.2 0.03 280/80%),oklch(0.22 0.025 260/80%));
  --shadow-glow:0 0 40px oklch(0.5 0.2 270/20%);
}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.bg-effects{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bg-effects div{position:absolute;border-radius:50%;filter:blur(100px)}
.bg-effects .b1{width:320px;height:320px;top:-160px;left:-160px;background:oklch(0.65 0.2 270/10%)}
.bg-effects .b2{width:384px;height:384px;top:33%;right:-160px;background:oklch(0.55 0.2 250/10%);filter:blur(120px)}
.bg-effects .b3{width:288px;height:288px;bottom:-80px;left:33%;background:oklch(0.75 0.18 60/8%)}

header{position:relative;z-index:10;background:var(--glass-strong);backdrop-filter:blur(30px) saturate(1.8);border-bottom:1px solid var(--glass-border);padding:12px 16px}
.header-inner{max-width:768px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:var(--gradient-hero);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow-glow)}
.logo h1{font-size:18px;font-weight:700;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.logo p{font-size:11px;color:var(--muted-fg)}
.lang-toggle{display:flex;gap:4px;padding:4px;border-radius:8px;background:oklch(0.22 0.03 280/60%)}
.lang-btn{border:none;cursor:pointer;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;font-family:inherit;background:transparent;color:var(--muted-fg);transition:all .2s}
.lang-btn:hover{color:var(--fg)}
.lang-btn.active{background:var(--gradient-hero);color:var(--primary-fg);box-shadow:0 2px 8px oklch(0 0 0/30%)}

main{flex:1;overflow-y:auto;padding:16px;position:relative;z-index:10}
main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-track{background:transparent}main::-webkit-scrollbar-thumb{background:oklch(0.35 0.03 280);border-radius:4px}
.messages{max-width:768px;margin:0 auto}

.msg{display:flex;margin-bottom:16px;animation:msgIn .3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{justify-content:flex-end}
.msg.assistant{justify-content:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:4px}
.msg.assistant .msg-avatar{background:var(--gradient-hero);margin-right:8px}
.msg.user .msg-avatar{background:var(--secondary);margin-left:8px}
.msg-bubble{max-width:80%;border-radius:16px;padding:12px 16px;font-size:14px;line-height:1.6}
.msg.user .msg-bubble{background:var(--gradient-user);color:var(--primary-fg);border-bottom-right-radius:6px}
.msg.assistant .msg-bubble{background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--glass-border);border-bottom-left-radius:6px;color:var(--fg)}
.msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}.msg-bubble ul,.msg-bubble ol{padding-left:20px;margin-bottom:8px}
.msg-bubble li{margin-bottom:4px}

.thinking{display:flex;align-items:flex-start;margin-bottom:16px;animation:msgIn .3s ease-out}
.thinking .msg-avatar{background:var(--gradient-hero);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;margin-right:8px;flex-shrink:0}
.thinking-dots{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:16px;border-bottom-left-radius:6px;padding:12px 20px;display:flex;gap:6px;align-items:center}
.thinking-dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:bounce 1.4s infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

.quick-bar{position:relative;z-index:10;border-top:1px solid oklch(0.4 0.04 280/15%);background:oklch(0.13 0.02 280/50%);backdrop-filter:blur(10px);padding:8px 16px 0}
.quick-inner{max-width:768px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.quick-inner::-webkit-scrollbar{height:0}
.quick-btn{flex-shrink:0;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;padding:6px 12px;border-radius:999px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);color:var(--fg);transition:all .2s}
.quick-btn:hover{box-shadow:var(--shadow-glow);transform:scale(1.03)}
.quick-btn:active{transform:scale(0.98)}
.quick-btn:disabled{opacity:0.5;pointer-events:none}

.input-bar{position:relative;z-index:10;border-top:1px solid oklch(0.4 0.04 280/15%);background:var(--glass-strong);backdrop-filter:blur(30px) saturate(1.8);padding:12px 16px}
.input-inner{max-width:768px;margin:0 auto;display:flex;gap:8px}
.input-inner input{flex:1;border:none;outline:none;font-family:inherit;font-size:14px;padding:10px 16px;border-radius:12px;background:oklch(0.25 0.03 280/50%);color:var(--fg);border:1px solid var(--glass-border);transition:all .2s}
.input-inner input::placeholder{color:var(--muted-fg)}
.input-inner input:focus{border-color:oklch(0.65 0.2 270/60%)}
.input-inner input:disabled{opacity:0.5}
.send-btn{width:40px;height:40px;flex-shrink:0;border:none;cursor:pointer;border-radius:12px;background:var(--gradient-hero);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-glow);transition:all .2s}
.send-btn:hover{transform:scale(1.05)}.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.4;pointer-events:none}
.send-btn svg{width:18px;height:18px}
</style>
</head>
<body>
<div class="bg-effects"><div class="b1"></div><div class="b2"></div><div class="b3"></div></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🏛️</div>
      <div><h1>Samvidhan AI</h1><p>Powered by Madhuri AI Digital Sakhi</p></div>
    </div>
    <div class="lang-toggle" id="langToggle"></div>
  </div>
</header>

<main id="chatArea"><div class="messages" id="messages"></div></main>

<div class="quick-bar"><div class="quick-inner" id="quickPrompts"></div></div>

<div class="input-bar">
  <form class="input-inner" id="chatForm">
    <input type="text" id="chatInput" placeholder="Ask about the Constitution..." autocomplete="off">
    <button type="submit" class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
    </button>
  </form>
</div>

<script>
const API_URL="https://samvidhan-ai-production.up.railway.app/chat";
const LANGS={en:"English",hi:"हिंदी",mr:"मराठी"};
const WELCOME={en:"Namaste! 🙏 I'm **Samvidhan AI**, your digital guide to the Indian Constitution. Ask me anything about your rights, duties, or any article!",hi:"नमस्ते! 🙏 मैं **संविधान AI** हूँ, भारतीय संविधान पर आपका डिजिटल गाइड। अपने अधिकारों, कर्तव्यों या किसी भी अनुच्छेद के बारे में पूछें!",mr:"नमस्कार! 🙏 मी **संविधान AI** आहे, भारतीय संविधानावरील तुमचा डिजिटल मार्गदर्शक. तुमचे अधिकार, कर्तव्ये किंवा कोणत्याही कलमाबद्दल विचारा!"};
const QUICK={en:[{l:"📜 Article 21",p:"Explain Article 21 of the Indian Constitution"},{l:"⚖️ Fundamental Rights",p:"What are the Fundamental Rights in the Indian Constitution?"},{l:"🤝 Duties",p:"What are the Fundamental Duties of Indian citizens?"}],hi:[{l:"📜 अनुच्छेद 21",p:"भारतीय संविधान के अनुच्छेद 21 की व्याख्या करें"},{l:"⚖️ मौलिक अधिकार",p:"भारतीय संविधान में मौलिक अधिकार क्या हैं?"},{l:"🤝 कर्तव्य",p:"भारतीय नागरिकों के मौलिक कर्तव्य क्या हैं?"}],mr:[{l:"📜 कलम 21",p:"भारतीय संविधानातील कलम 21 स्पष्ट करा"},{l:"⚖️ मूलभूत अधिकार",p:"भारतीय संविधानातील मूलभूत अधिकार कोणते?"},{l:"🤝 कर्तव्ये",p:"भारतीय नागरिकांची मूलभूत कर्तव्ये कोणती?"}]};
const PLACEHOLDER={en:"Ask about the Constitution...",hi:"अपना सवाल यहाँ लिखें...",mr:"तुमचा प्रश्न येथे लिहा..."};

let lang="en",loading=false;
const $=id=>document.getElementById(id);
const msgs=$("messages"),chatArea=$("chatArea"),input=$("chatInput"),form=$("chatForm"),sendBtn=$("sendBtn"),langToggle=$("langToggle"),quickDiv=$("quickPrompts");

function md(t){return t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>")}
function scroll(){setTimeout(()=>chatArea.scrollTop=chatArea.scrollHeight,50)}

function addMsg(role,content){
  const d=document.createElement("div");d.className="msg "+role;
  let html="";
  if(role==="assistant") html+=`<div class="msg-avatar">🏛️</div>`;
  html+=`<div class="msg-bubble">${role==="user"?`<p>${content.replace(/</g,"&lt;")}</p>`:md(content)}</div>`;
  if(role==="user") html+=`<div class="msg-avatar">👤</div>`;
  d.innerHTML=html;msgs.appendChild(d);scroll();
}

function showThinking(){const d=document.createElement("div");d.className="thinking";d.id="thinking";d.innerHTML=`<div class="msg-avatar">🏛️</div><div class="thinking-dots"><span></span><span></span><span></span></div>`;msgs.appendChild(d);scroll()}
function hideThinking(){const t=$("thinking");if(t)t.remove()}

function buildLang(){
  langToggle.innerHTML="";
  Object.entries(LANGS).forEach(([k,v])=>{const b=document.createElement("button");b.className="lang-btn"+(lang===k?" active":"");b.textContent=v;b.onclick=()=>{lang=k;msgs.innerHTML="";addMsg("assistant",WELCOME[k]);buildLang();buildQuick();input.placeholder=PLACEHOLDER[k]};langToggle.appendChild(b)});
}
function buildQuick(){
  quickDiv.innerHTML="";
  QUICK[lang].forEach(q=>{const b=document.createElement("button");b.className="quick-btn";b.textContent=q.l;b.disabled=loading;b.onclick=()=>send(q.p);quickDiv.appendChild(b)});
}

async function send(text){
  const t=text.trim();if(!t||loading)return;input.value="";
  addMsg("user",t);loading=true;sendBtn.disabled=true;showThinking();
  document.querySelectorAll(".quick-btn").forEach(b=>b.disabled=true);
  try{
    const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t})});
    if(!r.ok)throw new Error();const d=await r.json();
    const reply=d.response||d.reply||d.message||d.answer||JSON.stringify(d);
    hideThinking();addMsg("assistant",reply);
  }catch{hideThinking();addMsg("assistant","Sorry, I couldn't connect to the server. Please try again. 🙏")}
  finally{loading=false;input.disabled=false;input.focus();sendBtn.disabled=!input.value.trim();document.querySelectorAll(".quick-btn").forEach(b=>b.disabled=false)}
}

input.addEventListener("input",()=>{sendBtn.disabled=!input.value.trim()||loading});
form.addEventListener("submit",e=>{e.preventDefault();send(input.value)});
buildLang();buildQuick();addMsg("assistant",WELCOME.en);
</script>
</body>
</html>
